services:
  - type: web                       # Web Service — has a public HTTPS URL for webhooks
    name: bgmi-redeem-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false                 # Secret — set manually in Render dashboard
      - key: ADMIN_CHAT_ID
        value: "8876073547"
      - key: PYTHON_VERSION
        value: "3.12.7"
